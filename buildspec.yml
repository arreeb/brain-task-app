version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR
      - aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 256604024100.dkr.ecr.ap-south-1.amazonaws.com

  build:
    commands:
      - echo Build started on `date`
      - docker build -t brain-task-app .
      - docker tag brain-task-app:latest 256604024100.dkr.ecr.ap-south-1.amazonaws.com/brain-task-app:latest

  post_build:
    commands:
      - echo Pushing Docker image
      - docker push 256604024100.dkr.ecr.ap-south-1.amazonaws.com/brain-task-app:latest

artifacts:
  files:
    - '**/*'
